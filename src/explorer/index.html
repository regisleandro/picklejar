<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Picklejar Explorer</title>
  <style>
    html[data-theme="dark"] {
      --bg: #0c0c0e;
      --bg-elevated: #121214;
      --surface: #16161a;
      --surface-hover: #1c1c21;
      --border: #2a2a32;
      --text: #f4f4f5;
      --muted: #8b8b96;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --ok: #22c55e;
      --ended: #a855f7;
      --err: #ef4444;
      --code-bg: #0f0f12;
    }
    html[data-theme="light"] {
      --bg: #f4f4f5;
      --bg-elevated: #fff;
      --surface: #fff;
      --surface-hover: #f8f9fa;
      --border: #e5e7eb;
      --text: #18181b;
      --muted: #71717a;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --code-bg: #f4f4f5;
    }
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;
      --header-h: 56px;
      --actions-h: 64px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
      min-height: var(--header-h);
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
    }
    .app-header__brand {
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .app-header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .app-header__toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.5rem 0.75rem;
    }
    .header-vdivider {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }
    .theme-toggle-group {
      display: inline-flex;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--bg);
    }
    .theme-toggle-group .theme-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .theme-toggle-group .theme-btn:last-child { border-right: none; }
    .theme-toggle-group .theme-btn:hover {
      color: var(--accent);
      background: var(--surface-hover);
    }
    .theme-toggle-group .theme-btn[aria-pressed="true"] {
      color: var(--accent);
      background: var(--surface);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .theme-toggle-group .theme-btn svg { display: block; }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .icon-btn svg { display: block; }
    .btn {
      font: inherit;
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.8125rem;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #fff;
    }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-outline:hover {
      border-color: var(--muted);
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 300px) 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
    }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        max-height: 38vh;
        overflow: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .main-column { min-height: 50vh; }
    }
    .sidebar {
      min-width: 0;
      border-right: 1px solid var(--border);
      background: var(--bg-elevated);
      overflow-x: hidden;
      overflow-y: auto;
      padding: 0.625rem 0.5rem;
    }
    .card {
      position: relative;
      min-width: 0;
      max-width: 100%;
      padding: 0.7rem 0.75rem 0.7rem 0.85rem;
      margin-bottom: 0.4rem;
      border-radius: 6px;
      border: 1px solid transparent;
      border-left: 3px solid transparent;
      cursor: pointer;
      text-align: left;
      width: 100%;
      background: transparent;
      color: var(--text);
      font: inherit;
      overflow-wrap: anywhere;
      word-break: break-word;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .card:hover {
      background: var(--surface-hover);
    }
    .card.selected {
      background: var(--surface);
      border-color: var(--border);
      border-left-color: var(--ok);
    }
    .card-top {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .card-title {
      font-weight: 600;
      font-size: 0.875rem;
      margin: 0;
      line-height: 1.35;
      overflow-wrap: anywhere;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .agent-badge {
      display: inline-block;
      align-self: flex-start;
      font-size: 0.6875rem;
      font-weight: 600;
      line-height: 1;
      padding: 0.2em 0.55em;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.01em;
      text-transform: lowercase;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-active { background: var(--ok); }
    .dot-ended { background: var(--ended); }
    .dot-error { background: var(--err); }
    .main-column {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      background: var(--bg);
    }
    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      padding-bottom: 1rem;
    }
    .muted { color: var(--muted); }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1rem;
      color: var(--muted);
    }
    .empty-state svg { margin-bottom: 1rem; opacity: 0.5; width: 44px; height: 44px; }
    .placeholder { margin: 0; font-size: 0.95rem; }
    .section-kicker {
      margin: 0 0 0.875rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .detail-block {
      padding-bottom: 1.25rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-block:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }
    .field-value { margin: 0 0 1rem; font-size: 0.9rem; line-height: 1.5; }
    .field-value:last-child { margin-bottom: 0; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .status-text { text-transform: lowercase; }
    .code-block {
      margin: 0;
      padding: 1rem 1.1rem;
      font-family: var(--mono);
      font-size: 0.8125rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
    }
    .markdown-body { font-size: 0.875rem; line-height: 1.6; }
    .markdown-body p { margin-top: 0; margin-bottom: 1rem; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body pre { background: var(--code-bg); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; font-family: var(--mono); font-size: 0.8125rem; margin: 0 0 1rem 0; }
    .markdown-body code { font-family: var(--mono); background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.85em; border: 1px solid var(--border); }
    .markdown-body pre code { background: transparent; padding: 0; border: none; }
    .markdown-body ul, .markdown-body ol { margin-top: 0; margin-bottom: 1rem; padding-left: 1.5rem; }
    .markdown-body strong { font-weight: 600; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .human-body {
      margin: 0;
    }
    .timeline { border-left: 2px solid var(--border); margin-left: 6px; padding-left: 1rem; }
    .tl-item { position: relative; margin-bottom: 0.65rem; font-size: 0.8125rem; line-height: 1.4; }
    .tl-item::before {
      content: '';
      position: absolute;
      left: -1rem;
      top: 0.35rem;
      width: 8px;
      height: 8px;
      margin-left: -5px;
      border-radius: 50%;
      background: var(--muted);
    }
    .tl-item.tl-ok::before { background: var(--ok); }
    .tl-item.tl-bad::before { background: var(--err); }
    .tl-item.tl-muted { opacity: 0.5; }
    .tl-kind {
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .actions-footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: var(--actions-h);
      padding: 0.75rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg-elevated);
    }
    .actions-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .actions-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .open-drawer {
      flex-shrink: 0;
      background: var(--bg-elevated);
    }
    .open-panel:not([hidden]) {
      margin: 0 1.5rem 1.25rem;
      padding: 1rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--surface);
    }
    .open-panel label { display: block; margin: 0.4rem 0; font-size: 0.85rem; }
    .open-panel select {
      width: 100%;
      max-width: 280px;
      margin-top: 0.25rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      padding: 0.5rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      font-size: 0.85rem;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
    .error-text { color: var(--err); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header__brand">
      <h1>Picklejar Explorer</h1>
    </div>
    <div class="app-header__toolbar">
      <div class="theme-toggle-group" id="theme-toggle-group" role="group" aria-label="Theme">
        <button type="button" class="theme-btn" data-theme-mode="dark" title="Dark" aria-label="Dark theme" aria-pressed="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button type="button" class="theme-btn" data-theme-mode="light" title="Light" aria-label="Light theme" aria-pressed="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 6.34L4.93 4.93M19.07 19.07l-1.41-1.41M6.34 17.66l-1.41 1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>
      <span class="header-vdivider" aria-hidden="true"></span>
      <button type="button" class="icon-btn" id="refresh" title="Refresh" aria-label="Refresh sessions">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </header>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-column" id="main">
      <div class="detail-scroll">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          <p class="placeholder" id="placeholder">Select a session to view details.</p>
        </div>
      </div>
    </main>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <script src="/vendor/marked.js"></script>
  <script src="/vendor/dompurify.js"></script>
  <script>
(function () {
  const AGENTS = ['claude', 'cursor', 'opencode', 'cline', 'aider'];
  const PROFILES = ['balanced', 'strict', 'audit', 'recovery'];
  const EXCLUDE_OPTS = [
    { value: 'history', label: 'History' },
    { value: 'instructions', label: 'Instructions' },
    { value: 'discarded paths', label: 'Discarded paths' },
  ];

  let sessions = [];
  let selectedId = null;
  let summaryCache = null;
  let actionsCache = null;

  const $ = (id) => document.getElementById(id);
  const THEME_KEY = 'picklejar-explorer-theme';

  function setTheme(mode) {
    const m = mode === 'light' ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, m);
    document.documentElement.dataset.theme = m;
    document.querySelectorAll('.theme-btn').forEach((btn) => {
      const on = btn.getAttribute('data-theme-mode') === m;
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }

  function resolveStoredTheme(stored) {
    if (stored === 'light' || stored === 'dark') return stored;
    if (stored === 'system') {
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    return 'dark';
  }

  function initTheme() {
    setTheme(resolveStoredTheme(localStorage.getItem(THEME_KEY)));
    document.querySelectorAll('.theme-btn').forEach((btn) => {
      btn.addEventListener('click', () => setTheme(btn.getAttribute('data-theme-mode')));
    });
  }

  function toast(msg) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  }

  function relTime(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return s + ' sec ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + ' min ago';
    const h = Math.floor(m / 60);
    if (h < 48) return h + ' hr ago';
    const days = Math.floor(h / 24);
    return days + ' day' + (days === 1 ? '' : 's') + ' ago';
  }

  function dotClass(status) {
    if (status === 'ended') return 'dot-ended';
    if (status === 'error') return 'dot-error';
    return 'dot-active';
  }

  function actionKind(toolName) {
    const t = String(toolName || '').toLowerCase();
    if (t.includes('user')) return 'request';
    if (t.includes('read')) return 'read';
    if (/edit|write|patch|apply|str_replace|multiedit/.test(t)) return 'edit';
    return 'command';
  }


  function tlClasses(row) {
    let c = 'tl-item';
    if (row.curationStatus === 'confirmed') c += ' tl-ok';
    else if (['discarded', 'hallucinated', 'inconsistent'].includes(row.curationStatus)) c += ' tl-bad';
    if (row.includeInBrainDump === false) c += ' tl-muted';
    return c;
  }

  function setMainPlaceholder(html) {
    $('main').innerHTML = '<div class="detail-scroll">' + html + '</div>';
  }

  async function loadSessions() {
    const r = await fetch('/api/sessions');
    if (!r.ok) throw new Error('Failed to load sessions');
    sessions = await r.json();
    renderSidebar();
    if (selectedId && !sessions.some((s) => s.sessionId === selectedId)) {
      selectedId = null;
      setMainPlaceholder(`
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          <p class="placeholder" id="placeholder">Select a session.</p>
        </div>
      `);
    }
  }

  function renderSidebar() {
    const el = $('sidebar');
    el.innerHTML = '';
    for (const s of sessions) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'card' + (s.sessionId === selectedId ? ' selected' : '');
      const origin = s.agentOrigin || 'unknown';
      const errLine = s.status === 'error' && s.errorSummary
        ? `<div class="card-meta error-text">${escapeAttr(s.errorSummary.slice(0, 80))}${s.errorSummary.length > 80 ? '…' : ''}</div>`
        : '';
      btn.innerHTML = `
        <div class="card-top">
          <p class="card-title"><span class="dot ${dotClass(s.status)}" title="Status: ${s.status}"></span>${escapeAttr(s.title)}</p>
          <span class="agent-badge">${escapeAttr(origin)}</span>
        </div>
        <div class="card-meta">${relTime(s.updatedAt)} · ${s.actionsCount} actions</div>
        ${errLine}
      `;
      btn.addEventListener('click', () => selectSession(s.sessionId));
      el.appendChild(btn);
    }
  }

  function escapeAttr(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/"/g, '&quot;');
  }

  function renderMd(text) {
    if (!text) return '';
    try {
      const dirty = marked.parse(text);
      return DOMPurify.sanitize(dirty);
    } catch {
      return escapeAttr(text);
    }
  }

  async function selectSession(id) {
    selectedId = id;
    summaryCache = null;
    actionsCache = null;
    renderSidebar();
    setMainPlaceholder('<p class="placeholder">Loading…</p>');

    try {
      const [detailR, sumR, actR] = await Promise.all([
        fetch('/api/sessions/' + encodeURIComponent(id)),
        fetch('/api/sessions/' + encodeURIComponent(id) + '/summary'),
        fetch('/api/sessions/' + encodeURIComponent(id) + '/actions'),
      ]);
      if (!detailR.ok) throw new Error('Session not found');
      const detail = await detailR.json();
      summaryCache = await sumR.json();
      actionsCache = await actR.json();
      renderDetail(detail);
    } catch (e) {
      setMainPlaceholder('<p class="error-text">Failed to load session.</p>');
      toast(String(e.message || e));
    }
  }

  function renderDetail(vm) {
    const goal = vm.goal || vm.title;
    const stLabel = vm.status === 'ended' ? 'completed' : vm.status;
    const files = (vm.activeFiles || []).join(', ');

    let timelineHtml = '';
    for (const row of actionsCache || []) {
      const kind = actionKind(row.toolName);
      timelineHtml += `
        <div class="${tlClasses(row)}">
          <span class="tl-kind">${kind}</span> ${escapeAttr(row.toolName)} — ${escapeAttr(row.summary || '')}
        </div>`;
    }
    if (files) {
      timelineHtml += `<div class="tl-item" style="margin-top:0.75rem"><strong>Files touched</strong><br>${escapeAttr(files)}</div>`;
    }

    const openPanelId = 'open-panel';

    const execFields = `
      <div class="detail-block">
        <h2 class="section-kicker">Executive summary</h2>
        <span class="field-label">Goal</span>
        <div class="field-value markdown-body">${renderMd(goal)}</div>
        <span class="field-label">Status</span>
        <p class="field-value status-row">
          <span class="dot ${dotClass(vm.status)}"></span>
          <span class="status-text">${escapeAttr(stLabel)}</span>
        </p>
        <span class="field-label">Updated</span>
        <p class="field-value">Updated ${relTime(vm.updatedAt)} (${formatTime(vm.updatedAt)})</p>
        ${vm.lastPlannedAction ? `
        <span class="field-label">Next action</span>
        <div class="markdown-body" style="margin-bottom: 1.25rem">${renderMd(vm.lastPlannedAction)}</div>
        ` : ''}
        ${vm.errorSummary ? `
        <span class="field-label">Error</span>
        <p class="field-value error-text">${escapeAttr(vm.errorSummary)}</p>
        ` : ''}
        ${(vm.decisions && vm.decisions.length) ? `
        <span class="field-label">Decisions</span>
        <div class="field-value markdown-body"><ul>${vm.decisions.map((d) => `<li>${renderMd(d)}</li>`).join('')}</ul></div>
        ` : ''}
      </div>
      <div class="detail-block">
        <h2 class="section-kicker">Human summary</h2>
        <div class="markdown-body human-body">${renderMd(summaryCache.humanSummary)}</div>
      </div>
      <div class="detail-block">
        <h2 class="section-kicker">Timeline</h2>
        <div class="timeline">${timelineHtml || '<p class="muted">No actions.</p>'}</div>
      </div>
    `;

    $('main').innerHTML = `
      <div class="detail-scroll">
        ${execFields}
      </div>
      <footer class="actions-footer" id="actions-footer">
        <span class="actions-label">Actions</span>
        <div class="actions-buttons">
          <button type="button" class="btn btn-primary" id="copy-sum">Copy summary</button>
          <button type="button" class="btn btn-primary" id="copy-hand">Copy handoff</button>
          <button type="button" class="btn btn-outline" id="export-md">Export .md</button>
          <button type="button" class="btn btn-outline" id="toggle-open">Open in agent</button>
        </div>
      </footer>
      <div class="open-drawer">
        <div class="open-panel" id="${openPanelId}" hidden>
          <label>Agent<br>
            <select id="sel-agent">${AGENTS.map((a) => '<option value="' + a + '">' + a + '</option>').join('')}</select>
          </label>
          <label>Profile<br>
            <select id="sel-profile">${PROFILES.map((p) => '<option value="' + p + '">' + p + '</option>').join('')}</select>
          </label>
          <div id="exclude-box">${EXCLUDE_OPTS.map((o) => '<label><input type="checkbox" value="' + o.value + '"> ' + o.label + '</label>').join('')}</div>
          <button type="button" class="btn btn-primary" id="confirm-open" style="margin-top:0.5rem">Confirm and open</button>
        </div>
      </div>
    `;

    $('copy-sum').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(summaryCache.humanSummary || '');
        toast('Copied summary');
      } catch {
        toast('Clipboard failed');
      }
    });
    $('copy-hand').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(summaryCache.handoffSummary || '');
        toast('Copied handoff');
      } catch {
        toast('Clipboard failed');
      }
    });
    $('export-md').addEventListener('click', () => {
      const blob = new Blob([summaryCache.handoffSummary || ''], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'picklejar-' + vm.sessionId + '-handoff.md';
      a.click();
      URL.revokeObjectURL(a.href);
      toast('Download started');
    });
    $('toggle-open').addEventListener('click', () => {
      const p = $(openPanelId);
      p.hidden = !p.hidden;
    });
    $('confirm-open').addEventListener('click', async () => {
      const agent = $('sel-agent').value;
      const profile = $('sel-profile').value;
      const exclude = [];
      document.querySelectorAll('#exclude-box input:checked').forEach((cb) => exclude.push(cb.value));
      try {
        const r = await fetch('/api/sessions/' + encodeURIComponent(vm.sessionId) + '/open', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent, profile, exclude }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || 'Open failed');
        toast('Opened ' + agent);
      } catch (e) {
        toast(String(e.message || e));
      }
    });
  }

  $('refresh').addEventListener('click', () => {
    loadSessions().then(() => toast('Refreshed')).catch((e) => toast(String(e.message || e)));
  });

  initTheme();
  loadSessions().catch((e) => {
    $('sidebar').innerHTML = '<p class="error-text">' + escapeAttr(String(e.message || e)) + '</p>';
  });
})();
  </script>
</body>
</html>
